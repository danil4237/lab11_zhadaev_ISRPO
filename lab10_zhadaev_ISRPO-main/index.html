<!doctype html>
<html lang="ru-RU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <button class="menu-btn">☰</button>
        <div class="logo">
          <span class="logo-icon">▶</span>
          <span class="logo-text">YouTube</span>
        </div>
      </div>
      <div class="header-center">
        <input type="text" placeholder="Поиск" class="search-input" />
        <button class="search-btn">🔍</button>
      </div>
      <div class="header-right">
        <button>➕</button>
        <button>🔔</button>
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNQoZ_eF4ZVub99aUtKo8WZSBSLWEiyr99UQ&s"
          alt="Avatar"
          class="avatar"
        />
      </div>
    </header>

    <div class="content">
      <aside class="sidebar">
        <nav>
          <a href="#" class="sidebar-link active">
            <span class="icon">🏠 </span>
            <span>Главная</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="icon">🔥 </span>
            <span>В тренде</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="icon">✉️</span>
            <span>Подписки</span>
          </a>
        </nav>
        <hr />
        <nav>
          <a href="#" class="sidebar-link">
            <span class="icon">📚 </span>
            <span>Библиотека</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="icon">🕐 </span>
            <span>История</span>
          </a>
          <a href="#" class="sidebar-link">
            <span class="icon">👍 </span>
            <span>Понравилось</span>
          </a>
        </nav>
      </aside>
      <main class="main">
        <div class="chips">
          <div class="chip active">Все</div>
          <div class="chip">Музыка</div>
          <div class="chip">Игры</div>
          <div class="chip">Новости</div>
          <div class="chip">Спорт</div>
          <div class="chip">Образование</div>
          <div class="chip">Технологии</div>
        </div>

        <div class="video-grid">
          <!-- Видео 1 -->
          <article class="video-card">
            <div class="thumbnail">
              <img src="https://placehold.ru/320x180" />
              <span class="duration">22:15</span>
            </div>
            <div class="viaeo-info">
              <img
                src="https://placehold.ru/36"
                alt="Channel"
                class="chanell-avatar"
              />
              <div class="video-details">
                <h3 class="video-tite">
                  Обучающее видео по программированию на языке Python
                </h3>
                <p class="video-meta">890 тыс. просмотров • 3 дня назад</p>
              </div>
            </div>
          </article>
        </div>
      </main>
    </div>
  </body>
</html>
